version: 0.2

phases:
  install:
    commands:
      - echo Installing NuGet...
  build:
    commands:
      - nuget restore WL.PrecisionSample.sln
      - msbuild WL.PrecisionSample.sln /p:Configuration=Release
artifacts:
  files:
    - '**/*'
  discard-paths: yes
  base-directory: 'Members.PrecisionSample.Web/bin/Release'
