version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 4.8
    commands:
      - echo "====================================================="
      - echo "INSTALL PHASE - Restoring NuGet packages"
      - echo "====================================================="
      - nuget restore WL.PrecisionSample.sln

  pre_build:
    commands:
      - echo "====================================================="
      - echo "PRE-BUILD PHASE - Preparing artifact folder"
      - echo "====================================================="
      - powershell -Command "if (Test-Path 'C:\codebuild\artifacts') { Remove-Item -Recurse -Force C:\codebuild\artifacts }; New-Item -ItemType Directory -Path C:\codebuild\artifacts"

  build:
    commands:
      - echo "====================================================="
      - echo "BUILD PHASE - Compiling and publishing web project"
      - echo "====================================================="
      - msbuild "Members.NewOpinionBar.Web\Members.NewOpinionBar.Web.csproj" ^
          /p:DeployOnBuild=true ^
          /p:WebPublishMethod=FileSystem ^
          /p:Configuration=Release ^
          /p:SkipInvalidConfigurations=true ^
          /p:DeleteExistingFiles=True ^
          /p:publishUrl="C:\codebuild\artifacts" ^
          /p:DeployDefaultTarget=WebPublish ^
          /verbosity:minimal
      - echo "====================================================="
      - echo "BUILD COMPLETE - Listing generated files"
      - echo "====================================================="
      - dir C:\codebuild\artifacts

  post_build:
    commands:
      - echo "====================================================="
      - echo "POST-BUILD PHASE - Packaging and uploading artifact"
      - echo "====================================================="
      # Compress the artifact folder into a zip file named after your project
      - powershell -Command "Compress-Archive -Path 'C:\codebuild\artifacts\*' -DestinationPath 'C:\codebuild\wl-precisionsample-artifact.zip' -Force"
      # Upload to S3 (replace BUCKET_NAME with your actual artifact bucket)
      - aws s3 cp C:\codebuild\wl-precisionsample-artifact.zip s3://artifacts-bucket-name/wl-precisionsample/
      - echo "====================================================="
      - echo "UPLOAD COMPLETE"
      - echo "====================================================="

artifacts:
  type: no_artifacts
