version: 0.2

phases:
  install:
    commands:
      - echo Installing NuGet...
  build:
    commands:
      - nuget restore WL.PrecisionSample.sln
      - msbuild Members.PrecisionSample.Web\Members.PrecisionSample.Web.csproj /p:Configuration=Release

artifacts:
  files:
    - '**/*'
  discard-paths: yes
  secondary-artifacts:
    PrecisionSampleWeb:
      files:
        - '**/*'
      base-directory: '.'
