version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 4.8
    commands:
      - echo Installing NuGet and restoring packages...
      - nuget restore WL.PrecisionSample.sln

  build:
    commands:
      - echo Building Members.NewOpinionBar.Web...
      - |
        msbuild Members.NewOpinionBar.Web\Members.NewOpinionBar.Web.csproj ^
          /p:DeployOnBuild=true ^
          /p:WebPublishMethod=FileSystem ^
          /p:Configuration=Release ^
          /p:SkipInvalidConfigurations=true ^
          /p:DeleteExistingFiles=True ^
          /p:publishUrl="artifacts" ^
          /p:DeployDefaultTarget=WebPublish || echo "MSBuild returned non-zero exit code, check logs"
      - echo Build completed.

  post_build:
    commands:
      - echo Running Tests...
      - |
        if (Test-Path "**\bin\Release\*.Tests.dll") {
          vstest.console.exe "**\bin\Release\*.Tests.dll" --logger:trx
        } else {
          echo "No test DLLs found. Skipping tests."
        }

artifacts:
  files:
    - '**/*'
  discard-paths: yes
  base-directory: 'Members.NewOpinionBar.Web/bin/Release/net48'
  name: NewOpinionBarWeb-artifact
