version: 0.2
phases:
  install:
    commands:
      - 'choco install nuget.commandline -y' # if choco available
  pre_build:
    commands:
      - nuget restore WL.PrecisionSample.sln
  build:
    commands:
      - msbuild WL.PrecisionSample.sln /p:Configuration=Release
      - msbuild /t:Restore
      - msbuild Members.PrecisionSample.Common.csproj /p:Configuration=Release /p:OutputPath=C:\temp\publish
  post_build:
    commands:
      - powershell -Command "Compress-Archive -Path C:\temp\publish\* -DestinationPath C:\tmp\app-artifact.zip"
artifacts:
  files:
    - C:\tmp\app-artifact.zip
