version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 4.8
    commands:
      - echo Installing NuGet and restoring packages...
      - nuget restore WL.PrecisionSample.sln

  build:
    commands:
      - echo Building Members.NewOpinionBar.Web...
      - msbuild Members.NewOpinionBar.Web\Members.NewOpinionBar.Web.csproj /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:Configuration=Release /p:SkipInvalidConfigurations=true /p:DeleteExistingFiles=True /p:publishUrl="artifacts" /p:DeployDefaultTarget=WebPublish

  # Comment or fix this section based on test availability
  post_build:
    commands:
      - echo Running Tests...
      - |
        if (Test-Path "**\bin\Release\*.Tests.dll") {
          vstest.console.exe "**\bin\Release\*.Tests.dll" --logger:trx
        } else {
          echo "No test DLLs found. Skipping tests."
        }

artifacts:
  files:
    - artifacts/**
    - appspec.yml
  discard-paths: yes
  base-directory: 'artifacts'
  name: NewOpinionBarWeb-artifact
